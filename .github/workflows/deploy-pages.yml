name: Deploy site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate production env from secrets
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          APP_SITE_TITLE: ${{ vars.APP_SITE_TITLE }}
          APP_ADMIN_UIDS: ${{ vars.APP_ADMIN_UIDS }}
          APP_DISCORD_INVITE_URL: ${{ vars.APP_DISCORD_INVITE_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          WCL_CLIENT_ID: ${{ secrets.WCL_CLIENT_ID }}
          WCL_CLIENT_SECRET: ${{ secrets.WCL_CLIENT_SECRET }}
        run: |
          node -e "
            const fs = require('fs');
            const e = process.env;
            const lines = [
              ['VITE_FIREBASE_API_KEY', e.FIREBASE_API_KEY],
              ['VITE_FIREBASE_AUTH_DOMAIN', e.FIREBASE_AUTH_DOMAIN],
              ['VITE_FIREBASE_PROJECT_ID', e.FIREBASE_PROJECT_ID],
              ['VITE_FIREBASE_STORAGE_BUCKET', e.FIREBASE_STORAGE_BUCKET],
              ['VITE_FIREBASE_MESSAGING_SENDER_ID', e.FIREBASE_MESSAGING_SENDER_ID],
              ['VITE_FIREBASE_APP_ID', e.FIREBASE_APP_ID],
              ['VITE_APP_SITE_TITLE', e.APP_SITE_TITLE || 'Hope Raider'],
              ['VITE_APP_ADMIN_UIDS', e.APP_ADMIN_UIDS],
              ['VITE_APP_DISCORD_INVITE_URL', e.APP_DISCORD_INVITE_URL || 'https://discord.gg/H2MtWtBGGC'],
              ['VITE_DISCORD_WEBHOOK_URL', e.DISCORD_WEBHOOK_URL],
              ['VITE_WCL_CLIENT_ID', e.WCL_CLIENT_ID],
              ['VITE_WCL_CLIENT_SECRET', e.WCL_CLIENT_SECRET]
            ].map(([k, v]) => k + '=' + (v || '')).join('\n');
            fs.writeFileSync('.env.production', lines + '\n');
          "

      - name: Build production bundle
        run: npm run build

      - name: SPA deep-link fallback (404 = index)
        run: cp dist/index.html dist/404.html

      - name: Verify dist has no env files
        run: |
          if find dist -type f \( -name ".env" -o -name ".env.*" \) | grep -q .; then
            echo "Blocked: dist bundle includes an env file."
            find dist -type f \( -name ".env" -o -name ".env.*" \)
            exit 1
          fi

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
